{% load static %}
<!DOCTYPE html>
<html lang="es">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Iniciar Sesión</title>


<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.7/dist/css/bootstrap.min.css" rel="stylesheet">


<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">


<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}


body{

    background:linear-gradient(135deg,#001F54,#0A3D91,#1565C0);

    min-height:100vh;

    display:flex;
    justify-content:center;
    align-items:center;

    font-family:Arial, Helvetica, sans-serif;

}


.login-card{

    width:430px;

    background:#fff;

    border-radius:20px;

    overflow:hidden;

    box-shadow:0 15px 35px rgba(0,0,0,.35);

}


.login-header{

    background:#001F54;

    color:white;

    text-align:center;

    padding:30px;

}


.logo{

    width:90px;

    margin-bottom:15px;

}


.login-body{

    padding:35px;

}


.form-label{

    font-weight:bold;

    color:#001F54;

}


.form-control{

    height:48px;

    border-radius:10px;

    border:2px solid #dcdcdc;

}


.form-control:focus{

    border-color:#FFC107;

    box-shadow:0 0 0 .2rem rgba(255,193,7,.25);

}


.btn-login{

    width:100%;

    background:#FFC107;

    color:#001F54;

    font-weight:bold;

    border:none;

    border-radius:10px;

    height:48px;

    transition:.3s;

}


.btn-login:hover{

    background:#FFD54F;

    transform:scale(1.02);

}


.register{

    text-align:center;

    margin-top:20px;

}


.register a{

    text-decoration:none;

    color:#1565C0;

    font-weight:bold;

}


/* OJO CONTRASEÑA */

.password-container{

    position:relative;

}


.password-container .form-control{

    padding-right:50px;

}


.btn-eye{

    position:absolute;

    right:12px;

    top:50%;

    transform:translateY(-50%);

    border:none;

    background:none;

    cursor:pointer;

    font-size:20px;

    color:#001F54;

}


</style>


</head>


<body>


<div class="login-card">


<div class="login-header">


<img src="{% static 'img/logo.png' %}" class="logo">


<h2>Lácteos Zulianos</h2>


<p>Bienvenido nuevamente</p>


</div>



<div class="login-body">


<form method="POST">


{% csrf_token %}



<div class="mb-3">


<label class="form-label">

Usuario

</label>


{{ form.username }}


</div>





<div class="mb-4">


<label class="form-label">

Contraseña

</label>



<div class="password-container">


{{ form.password }}



<button type="button" class="btn-eye" onclick="mostrarPassword('id_password', this)">


<i class="bi bi-eye-slash"></i>


</button>


</div>



</div>





<button type="submit" class="btn btn-login">


Iniciar Sesión


</button>



</form>




<div class="register">


¿No tienes una cuenta?


<a href="{% url 'registro' %}">

Regístrate aquí

</a>


</div>



</div>


</div>




<script>


function mostrarPassword(id, boton){


    let campo = document.getElementById(id);

    let icono = boton.querySelector("i");



    if(campo.type === "password"){


        campo.type = "text";


        icono.classList.remove("bi-eye-slash");

        icono.classList.add("bi-eye");


    }else{


        campo.type = "password";


        icono.classList.remove("bi-eye");

        icono.classList.add("bi-eye-slash");


    }


}


</script>



</body>

</html>
