{% extends "masterpage_dashboard.html" %}
{% load static %}

{% block content %}

<style>
body{ background:#f4f7fc; font-family:'Segoe UI',sans-serif; }

.overlay{
    position:fixed; inset:0; background:rgba(0,0,0,.45);
    display:flex; justify-content:center; align-items:center;
    padding:25px; z-index:9999;
}

.modal-formulario{
    width:100%; max-width:700px; max-height:95vh; overflow-y:auto;
    border-radius:20px; animation:aparecer .35s ease;
}

.header-form{
    background:linear-gradient(135deg,#192987,#3556ff);
    color:white; padding:14px 30px; border-radius:20px 20px 0 0;
    box-shadow:0 8px 20px rgba(0,0,0,.15);
}
.header-form h2{ margin:0; font-size:22px; font-weight:700; }
.header-form p{ margin-top:3px; margin-bottom:0; font-size:13px; opacity:.9; }

.card-form{
    background:white; padding:20px 30px; border-radius:0 0 20px 20px;
    box-shadow:0 12px 30px rgba(0,0,0,.08);
}

.form-grid{ display:grid; grid-template-columns:repeat(2,1fr); gap:12px 22px; }
.form-grid p{ margin:0; display:flex; flex-direction:column; }

label{ font-weight:600; color:#192987; margin-bottom:4px; font-size:14px; }

input, select, textarea{
    width:100%; height:36px; border:1px solid #d8d8d8; border-radius:8px;
    padding:6px 12px; transition:.3s; font-size:13px; background:#fff;
}
input:focus{ outline:none; border-color:#3556ff; box-shadow:0 0 10px rgba(53,86,255,.20); }

input[type=checkbox]{ width:18px; height:18px; margin-top:4px; box-shadow:none; }

.botones{
    display:flex; justify-content:flex-end; gap:12px; margin-top:18px;
    background:#f4f7fc; border:1px solid rgba(2,44,99,.08);
    border-radius:12px; padding:10px 16px;
}

.btn-volver{
    background:#6c757d; color:white; padding:8px 18px; font-size:14px;
    border-radius:8px; text-decoration:none; transition:.3s;
}
.btn-volver:hover{ background:#555d65; color:white; transform:translateY(-2px); }

.btn-guardar{
    background:#192987; color:white; border:none; padding:8px 18px;
    font-size:14px; border-radius:8px; transition:.3s;
}
.btn-guardar:hover{ background:#101d64; color:white; transform:translateY(-2px); }

.errorlist{ list-style:none; margin:5px 0 0; padding:0; color:#dc3545; font-size:14px; }
.helptext{ font-size:13px; color:#777; margin-top:5px; }

@keyframes aparecer{
    from{ opacity:0; transform:translateY(-30px) scale(.95); }
    to{ opacity:1; transform:translateY(0) scale(1); }
}

@media(max-width:992px){
    .modal-formulario{ max-width:95%; }
    .form-grid{ grid-template-columns:1fr; }
    .header-form{ text-align:center; }
}
@media(max-width:576px){
    .overlay{ padding:10px; }
    .card-form{ padding:20px; }
    .header-form{ padding:20px; }
    .botones{ flex-direction:column; }
    .botones a, .botones button{ width:100%; }
}
</style>

<div class="overlay">
    <div class="modal-formulario">

        <div class="header-form">
            <h2><i class="bi bi-gear-fill"></i> Nueva Regla Automática</h2>
            <p>Define cuándo debe activarse un descuento sin intervención manual.</p>
        </div>

        <div class="card-form">
            <form method="POST">
                {% csrf_token %}
                <div class="form-grid">
                    {{ form.as_p }}
                </div>

                <div class="botones">
                    <a href="{% url 'listar_descuentos' %}" class="btn btn-volver">
                        <i class="bi bi-arrow-left"></i> Volver
                    </a>
                    <button type="submit" class="btn btn-guardar">
                        <i class="bi bi-check-circle-fill"></i> Guardar Regla
                    </button>
                </div>
            </form>
        </div>
    </div>
</div>
{% endblock %}
