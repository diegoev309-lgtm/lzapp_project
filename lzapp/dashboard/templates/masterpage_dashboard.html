<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>{% block title %}Dashboard{% endblock %}</title>

    {% load static %}

    <!-- Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet">

    <!-- Bootstrap Icons -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">

    <!-- Fuente -->
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">

    <!-- CSS -->
    <link rel="stylesheet" href="{% static 'accounts/css/accounts.css' %}">

    <style>
        :root{
            --azul-oscuro:#192987;
            --azul-claro:#3556ff;
            --degradado-marca:linear-gradient(135deg,var(--azul-oscuro),var(--azul-claro));
        }

        body {
            font-family: 'Montserrat', sans-serif;
            background: #f8f9fa;
        }

        /*==========================
              SIDEBAR ESCRITORIO
        ===========================*/

        aside.sidebar{
            border-right:1px solid rgba(2,44,99,.06);
        }

        /* Línea de acento superior, mismo degradado que el resto de la app */
        aside.sidebar::before{
            content:"";
            display:block;
            height:4px;
            background:var(--degradado-marca);
        }

        /*==========================
          LOGO CON TEXTO DIFUMINADO
        ===========================*/

        .logo-marca{
            display:flex;
            align-items:center;
            justify-content:center;
            gap:10px;
            padding:22px 10px 18px;
            margin-bottom:10px;
            border-bottom:1px solid rgba(2,44,99,.08);
        }

        .logo-marca-icono{
            width:38px;
            height:38px;
            flex-shrink:0;
            display:flex;
            align-items:center;
            justify-content:center;
            border-radius:11px;
            background:var(--degradado-marca);
            color:white;
            font-size:18px;
            box-shadow:0 6px 14px rgba(25,41,135,.3);
        }

        .logo-marca-texto{
            margin:0;
            font-size:22px;
            font-weight:800;
            letter-spacing:.3px;
            background:var(--degradado-marca);
            -webkit-background-clip:text;
            background-clip:text;
            -webkit-text-fill-color:transparent;
            color:var(--azul-oscuro); /* respaldo si el navegador no soporta el degradado en texto */
        }

        /*==========================
            ENLACES DE NAVEGACIÓN
        ===========================*/

        .nav-lateral{
            padding:0 10px;
        }

        .nav-link {
            position:relative;
            display:flex;
            align-items:center;
            color: #4a5163;
            padding: 11px 14px;
            border-radius: 10px;
            margin-bottom: 4px;
            font-size:14.5px;
            font-weight:500;
            transition:.25s;
        }

        .nav-link i{
            font-size:16px;
            width:20px;
            transition:.25s;
        }

        .nav-link:hover {
            background: #eef1fb;
            color:var(--azul-oscuro);
            transform: translateX(4px);
        }

        .nav-link.active {
            background: var(--degradado-marca);
            color: white !important;
            font-weight: 600;
            box-shadow:0 6px 14px rgba(25,41,135,.28);
        }

        /* Barra de acento a la izquierda del item activo */
        .nav-link.active::before{
            content:"";
            position:absolute;
            left:-10px;
            top:50%;
            transform:translateY(-50%);
            width:4px;
            height:60%;
            border-radius:4px;
            background:var(--azul-claro);
        }

        /* Foco visible para navegación con teclado */
        .nav-link:focus-visible{
            outline:2px solid var(--azul-claro);
            outline-offset:2px;
        }

        .card {
            border: none;
            border-radius: 15px;
        }

        /*==========================
          BOTÓN MENÚ (móvil)
        ===========================*/

        .barra-menu-movil{
            background:white;
            border-bottom:1px solid rgba(2,44,99,.08);
        }

        .btn-menu {
            background: var(--degradado-marca);
            color: white;
            border: none;
            border-radius:10px;
            padding:9px 16px;
            font-weight:600;
            transition:.25s;
        }

        .btn-menu:hover {
            color: white;
            transform:translateY(-1px);
            box-shadow:0 8px 18px rgba(25,41,135,.3);
        }

        .btn-menu:focus,
        .btn-menu:active {
            color: white !important;
            box-shadow: 0 0 0 0.25rem rgba(25, 41, 135, 0.25);
        }

        /* Logo también difuminado dentro del menú offcanvas */
        .offcanvas-header .logo-marca-texto-sm{
            background:var(--degradado-marca);
            -webkit-background-clip:text;
            background-clip:text;
            -webkit-text-fill-color:transparent;
            color:var(--azul-oscuro);
            font-weight:800;
        }

        @media(prefers-reduced-motion: reduce){
            .nav-link, .btn-menu{ transition:none; }
        }
    </style>
</head>
<body>

<div class="container-fluid">
    <div class="row">

        <!-- Botón menú para móviles -->
        <div class="d-md-none p-2 barra-menu-movil">
            <button class="btn btn-menu" type="button" data-bs-toggle="offcanvas" data-bs-target="#sidebar">
                <i class="bi bi-list"></i> Menu
            </button>
        </div>

        <!-- Sidebar escritorio -->
        <aside class="sidebar col-md-3 col-lg-2 d-none d-md-block bg-light vh-100 shadow p-0">

            <div class="logo-marca">
                <span class="logo-marca-icono">
                    <i class="bi bi-shop"></i>
                </span>
                <h3 class="logo-marca-texto">LzApp</h3>
            </div>

            <div class="nav flex-column nav-lateral">

                <a class="nav-link {% if request.resolver_match.url_name == 'Inicio' %}active{% endif %}"
                   href="{% url 'Inicio' %}">
                    <i class="bi bi-house-door-fill me-2"></i>
                    Inicio
                </a>

                <a class="nav-link {% if request.resolver_match.url_name == 'listar_productos' %}active{% endif %}"
                   href="{% url 'listar_productos' %}">
                    <i class="bi bi-basket-fill me-2"></i>
                    Productos
                </a>
                
                <a class="nav-link {% if request.resolver_match.url_name == 'listar_descuentos' %}active{% endif %}"
                   href="{% url 'listar_descuentos' %}">
                    <i class="bi bi-tags-fill me-2"></i>
                    Descuentos
                </a>
                
                <a class="nav-link {% if request.resolver_match.url_name == 'listar_producciones' %}active{% endif %}"
                   href="{% url 'listar_producciones' %}">
                    <i class="bi bi-box-seam me-2"></i>
                    Producción
                </a>

                <a class="nav-link {% if request.resolver_match.url_name == 'Ventas' %}active{% endif %}"
                   href="{% url 'Ventas' %}">
                    <i class="bi bi-cash-stack me-2"></i>
                    Ventas
                </a>

                <a class="nav-link {% if request.resolver_match.url_name == 'Pedidos' %}active{% endif %}"
                   href="{% url 'Pedidos' %}">
                    <i class="bi bi-truck me-2"></i>
                    Pedidos
                </a>

                <a class="nav-link {% if request.resolver_match.url_name == 'Usuarios' %}active{% endif %}"
                   href="{% url 'Usuarios' %}">
                    <i class="bi bi-people-fill me-2"></i>
                    Usuarios
                </a>

                <a class="nav-link {% if request.resolver_match.url_name == 'Notificaciones' %}active{% endif %}"
                   href="{% url 'Notificaciones' %}">
                    <i class="bi bi-bell-fill me-2"></i>
                    Notificaciones
                </a>

            </div>

        </aside>

        <!-- Sidebar móvil -->
        <div class="offcanvas offcanvas-start" tabindex="-1" id="sidebar">

            <div class="offcanvas-header">
                <h5>
                    <i class="bi bi-shop"></i>
                    <span class="logo-marca-texto-sm">LzApp</span>
                </h5>

                <button type="button"
                        class="btn-close"
                        data-bs-dismiss="offcanvas">
                </button>
            </div>

            <div class="offcanvas-body">

                <div class="nav flex-column nav-lateral">

                    <a class="nav-link" href="{% url 'Inicio' %}">
                        <i class="bi bi-house-door-fill me-2"></i>
                        Inicio
                    </a>

                    <a class="nav-link" href="{% url 'listar_productos' %}">
                        <i class="bi bi-basket-fill me-2"></i>
                        Productos
                    </a>

                    <a class="nav-link" href="{% url 'listar_descuentos' %}">
                        <i class="bi bi-tags-fill me-2"></i>
                        Descuentos
                    </a>

                    <a class="nav-link" href="{% url 'listar_producciones' %}">
                        <i class="bi bi-box-seam me-2"></i>
                        Producción
                    </a>

                    <a class="nav-link" href="{% url 'Ventas' %}">
                        <i class="bi bi-cash-stack me-2"></i>
                        Ventas
                    </a>

                    <a class="nav-link" href="{% url 'Pedidos' %}">
                        <i class="bi bi-truck me-2"></i>
                        Pedidos
                    </a>

                    <a class="nav-link" href="{% url 'Usuarios' %}">
                        <i class="bi bi-people-fill me-2"></i>
                        Usuarios
                    </a>

                    <a class="nav-link" href="{% url 'Notificaciones' %}">
                        <i class="bi bi-bell-fill me-2"></i>
                        Notificaciones
                    </a>

                </div>

            </div>

        </div>

        <!-- Contenido -->
        <main class="col-md-9 col-lg-10 p-4">

            {% block content %}
            {% endblock %}

        </main>

    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"></script>

</body>
</html>
