{% extends "masterpage_dashboard.html" %}

{% load static %}

{% block content %}

<head>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

    <link rel="stylesheet"
    href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">

    <style>
        body{
            background: #f4f7fc;
            font-family: 'Segoe UI', sans-serif;
        }

        /* Tarjeta */
        .card-eliminar{
            background: #fff;
            padding: 40px;
            border-radius: 20px;
            box-shadow: 0px 8px 25px rgba(0,0,0,0.08);
            animation: aparecer .5s ease;
        }

        /* Ícono */
        .icono-alerta{
            font-size: 70px;
            color: #dc3545;
            margin-bottom: 20px;
        }

        /* Título */
        .titulo-eliminar{
            color: #192987;
            font-weight: 700;
            margin-bottom: 20px;
        }

        /* Nombre del producto */
        .nombre-producto{
            background: #f8f9fa;
            padding: 15px;
            border-radius: 12px;
            font-size: 20px;
            font-weight: 600;
            color: #555;
            border-left: 5px solid #dc3545;
        }

        /* Botón eliminar */
        .btn-eliminar{
            background: #dc3545;
            color: white;
            border: none;
            padding: 10px 25px;
            border-radius: 10px;
            transition: .3s;
        }

        .btn-eliminar:hover{
            background: #bb2d3b;
            color: white;
            transform: translateY(-2px);
        }

        /* Botón cancelar */
        .btn-cancelar{
            background: #6c757d;
            color: white;
            padding: 10px 25px;
            border-radius: 10px;
            text-decoration: none;
            transition: .3s;
        }

        .btn-cancelar:hover{
            background: #5a6268;
            color: white;
            transform: translateY(-2px);
        }

        /* Animación */
        @keyframes aparecer{
            from{
                opacity: 0;
                transform: translateY(30px);
            }
            to{
                opacity: 1;
                transform: translateY(0);
            }
        }
    </style>
</head>
<body>
<div class="container mt-5">

    <div class="row justify-content-center">
        <div class="col-md-6">

            <div class="card-eliminar">

                <div class="text-center">
                    <i class="bi bi-exclamation-triangle-fill icono-alerta"></i>

                    <h2 class="titulo-eliminar">
                        ¿Desea eliminar el producto?
                    </h2>

                    <p class="nombre-producto">
                        {{ producto.nombre }}
                    </p>
                </div>

                <form action="" method="POST">
                    {% csrf_token %}

                    <div class="d-flex justify-content-center gap-3 mt-4">

                        <a href="{% url 'listar_productos' %}"
                           class="btn btn-cancelar">
                            <i class="bi bi-arrow-left"></i>
                            Cancelar
                        </a>

                        <button type="submit"
                                class="btn btn-eliminar">
                            <i class="bi bi-trash"></i>
                            Eliminar
                        </button>

                    </div>
                </form>

            </div>

        </div>
    </div>

</div>
</body>
{% endblock %}
