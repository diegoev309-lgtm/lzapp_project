{% extends "masterpage_dashboard.html" %}

{% load static %}

{% block content %}

<head>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

    <link rel="stylesheet"
    href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">    
    <style>
        body{
            background: #f4f7fc;
            font-family: 'Segoe UI', sans-serif;
        }

        /* Tarjeta del formulario */
        .card-formulario{
            background: white;
            padding: 35px;
            border-radius: 20px;
            box-shadow: 0px 8px 25px rgba(0,0,0,0.08);
            animation: aparecer .5s ease;
        }

        /* Título */
        .titulo-formulario{
            text-align: center;
            color: #192987;
            font-weight: 700;
            margin-bottom: 30px;
        }

        /* Campos del formulario */
        .card-formulario p{
            margin-bottom: 20px;
        }

        .card-formulario label{
            display: block;
            margin-bottom: 8px;
            font-weight: 600;
            color: #444;
        }

        /* Inputs generados por Django */
        .card-formulario input,
        .card-formulario select,
        .card-formulario textarea{
            width: 100%;
            padding: 12px;
            border: 1px solid #dcdcdc;
            border-radius: 10px;
            outline: none;
            transition: .3s;
        }

        .card-formulario input:focus,
        .card-formulario select:focus,
        .card-formulario textarea:focus{
            border-color: #192987;
            box-shadow: 0 0 8px rgba(25,41,135,0.2);
        }

        /* Botón Guardar */
        .btn-guardar{
            background: #192987;
            color: white;
            padding: 10px 25px;
            border-radius: 10px;
            border: none;
            transition: .3s;
        }

        .btn-guardar:hover{
            background: #101d64;
            color: white;
            transform: translateY(-2px);
        }

        /* Botón Volver */
        .btn-volver{
            background: #6c757d;
            color: white;
            padding: 10px 25px;
            border-radius: 10px;
            text-decoration: none;
            transition: .3s;
        }

        .btn-volver:hover{
            background: #5a6268;
            color: white;
            transform: translateY(-2px);
        }

        /* Animación */
        @keyframes aparecer{
            from{
                opacity: 0;
                transform: translateY(30px);
            }
            to{
                opacity: 1;
                transform: translateY(0);
            }
        }
    </style>
</head>
<body>
<div class="container mt-5">

    <div class="row justify-content-center">
        <div class="col-lg-6 col-md-8">

            <div class="card-formulario">

                <h2 class="titulo-formulario">
                    📦 Formulario de Productos
                </h2>

                <form action="" method="POST" enctype="multipart/form-data">
                    {% csrf_token %}

                    <div class="mb-3">
                        {{ form.as_p }}
                    </div>

                    <div class="d-flex justify-content-between mt-4">
                        <a href="{% url 'listar_productos' %}"
                           class="btn btn-volver">
                            <i class="bi bi-arrow-left"></i>
                            Volver
                        </a>

                        <button type="submit"
                                class="btn btn-guardar">
                            <i class="bi bi-check-circle"></i>
                            Guardar
                        </button>
                    </div>

                </form>

            </div>

        </div>
    </div>
</body>

{% endblock %}
