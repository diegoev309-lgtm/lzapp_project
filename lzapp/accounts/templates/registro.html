<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Registro</title>

    {% load static %}
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="{% static 'accounts/css/accounts.css' %}">
</head>
<body>

    <header>
        <div class="d-flex justify-content-start p-3">
            <button class="btn btn-primary">
                ← Volver
            </button>
        </div>
    </header>

    <main class="container min-vh-100 d-flex justify-content-center align-items-center">

        <div class="card shadow p-4" style="max-width:450px; width:100%;">

            <div class="card-body">

                <h2 class="text-center mb-4">Registro</h2>

                <form>

                    <div class="form-floating mb-3">
                        <input type="text" class="form-control" id="nombre" placeholder="Nombre">
                        <label for="nombre">Nombre</label>
                    </div>

                    <div class="form-floating mb-3">
                        <input type="email" class="form-control" id="correo" placeholder="Correo">
                        <label for="correo">Correo electrónico</label>
                    </div>

                    <div class="form-floating mb-3">
                        <input type="password" class="form-control" id="password" placeholder="Contraseña">
                        <label for="password">Contraseña</label>
                    </div>

                    <div class="form-floating mb-3">
                        <input type="password" class="form-control" id="confirmar" placeholder="Confirmar contraseña">
                        <label for="confirmar">Confirmar contraseña</label>
                    </div>

                    <div class="form-floating mb-3">
                        <input type="text" class="form-control" id="telefono" placeholder="Teléfono">
                        <label for="telefono">Teléfono</label>
                    </div>

                    <div class="form-floating mb-4">
                        <input type="text" class="form-control" id="direccion" placeholder="Dirección">
                        <label for="direccion">Dirección</label>
                    </div>

                    <div class="d-flex justify-content-center mb-3">
                        <button type="submit" class="btn btn-primary px-5">
                            Registrarse
                        </button>
                    </div>

                    <div class="text-center">
                        <p>
                            ¿Ya tienes una cuenta?
                            <a href="login.html">Inicia sesión aquí</a>
                        </p>
                    </div>

                </form>

            </div>

        </div>

    </main>

</body>
</html>
