<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login</title>

    {% load static %}
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
    <link rel="stylesheet" href="{% static 'accounts/css/accounts.css' %}">

</head>
<body>

    <header>
        <div class="d-flex justify-content mb-3">
            <button class="btn btn-primary px-5">
                Volver
            </button>
        </div>
    </header>

    <main class="container min-vh-100 d-flex justify-content-center align-items-center">

        <div class="card shadow p-3" style="max-width: 400px; width: 100%;">
            <div class="card-body">

                <h3 class="card-title text-center mb-4">Inicio de sesión</h3>

                <div class="form-floating mb-3">
                    <input type="email" class="form-control" id="floatingInput" placeholder="name@example.com">
                    <label for="floatingInput">Correo electrónico</label>
                </div>

                <div class="form-floating mb-3">
                    <input type="password" class="form-control" id="floatingPassword" placeholder="Password">
                    <label for="floatingPassword">Contraseña</label>
                </div>

                <div class="form-floating mb-3">
                    <a href="password.html">¿Olvidaste tu contraseña?</a>
                </div>

                <div class="d-flex justify-content-center mb-3">
                    <button class="btn btn-primary px-5">
                        Iniciar sesión
                    </button>
                </div>

                <div class="form-floating mb-3">
                    <p>¿No tienes una cuenta todavia?<a href="_____">Registrate aqui</a></p>
                </div>
            </div>
        </div>

    </main>

</body>
</html>
